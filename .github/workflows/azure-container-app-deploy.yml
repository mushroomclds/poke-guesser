name: Deploy to Azure Container App

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.angular
          push: true
          tags: ghcr.io/${{ github.repository }}/pokeapp_frontend:${{ github.sha }}
      
      - name: Setup Oracle Wallet
        run: |
          mkdir -p wallet
          echo "${{ secrets.WALLET_CWALLET }}" | base64 -d > wallet/cwallet.sso
          echo "${{ secrets.WALLET_EWALLET }}" | base64 -d > wallet/ewallet.p12
          echo "${{ secrets.WALLET_TNSNAMES }}" | base64 -d > wallet/tnsnames.ora
          echo "${{ secrets.WALLET_SQLNET }}" | base64 -d > wallet/sqlnet.ora
          chmod 600 wallet/*

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.flask
          push: true
          tags: ghcr.io/${{ github.repository }}/pokeapp_backend:${{ github.sha }} 

      - name: Azure CLI login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
          --name poke-tcg-guesser-backend \
          --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
          --image ghcr.io/${{ github.repository }}/pokeapp_backend:${{ github.sha }}

          az containerapp update \
          --name poke-tcg-guesser-frontend \
          --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
          --image ghcr.io/${{ github.repository }}/pokeapp_frontend:${{ github.sha }}